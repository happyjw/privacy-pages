<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checkout — Amazon Review Analyzer</title>
  <link rel="stylesheet" href="../shared/policy.css" />
  <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
  <script>
    // Sandbox client-side token (Paddle.js). Swap for Live token when going live.
    var SUCCESS_URL = 'https://happjw.dev/amazon-review-analyzer/success.html';

    function goSuccess() {
      // Immediate navigation — do not wait for Paddle's delayed successUrl redirect.
      window.location.replace(SUCCESS_URL);
    }

    Paddle.Environment.set('sandbox');
    Paddle.Initialize({
      token: 'test_b6e8525439115bd2cebe67ae17c',
      eventCallback: function (event) {
        if (event.name === 'checkout.completed') {
          goSuccess();
        }
      },
      checkout: {
        settings: {
          displayMode: 'overlay',
          theme: 'light',
          variant: 'one-page',
          successUrl: SUCCESS_URL,
        },
      },
    });
    // When opened as default payment link (?_ptxn=txn_...), Paddle.js opens checkout automatically.
  </script>
</head>
<body>
  <header class="site-header">
    <a href="/">← HappyJW</a>
  </header>
  <main>
    <div class="card">
      <h1>Checkout</h1>
      <p class="meta">Amazon Review Analyzer Pro · Secure payment via Paddle</p>
      <p>
        If the payment window does not open automatically, return to the extension and try
        <strong>Upgrade</strong> again.
      </p>
      <p>
        After paying, this tab jumps to a success page — then go back to the Chrome extension.
      </p>
      <p><a href="./">← Back to product</a></p>
    </div>
  </main>
</body>
</html>
