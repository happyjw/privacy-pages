<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Payment complete — Amazon Review Analyzer</title>
  <style>
    :root {
      --bg: #f6f4ef;
      --ink: #1a1a1a;
      --muted: #5c5c5c;
      --accent: #0b6e4f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(160deg, #eef5f1 0%, var(--bg) 45%, #f0ebe3 100%);
      color: var(--ink);
      padding: 1.5rem;
    }
    .box {
      max-width: 28rem;
      text-align: center;
    }
    h1 {
      margin: 0 0 0.75rem;
      font-size: 1.75rem;
      letter-spacing: -0.02em;
    }
    p {
      margin: 0 0 0.75rem;
      color: var(--muted);
      line-height: 1.5;
    }
    .ok {
      color: var(--accent);
      font-weight: 600;
    }
    a {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="box">
    <p class="ok">Payment successful</p>
    <h1>You are Pro</h1>
    <p>
      Return to the <strong>Amazon Review Analyzer</strong> side panel —
      your plan refreshes automatically.
    </p>
    <p><a href="./">Product home</a></p>
  </div>
</body>
</html>
